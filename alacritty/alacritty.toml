[terminal]
[general]
live_config_reload = true
[terminal.shell]
program = "/opt/homebrew/bin/fish"
args = ["--login"]
[colors.bright]
black = "#4c566a"
blue = "#81a1c1"
cyan = "#8fbcbb"
green = "#a3be8c"
magenta = "#b48ead"
red = "#bf616a"
white = "#eceff4"
yellow = "#ebcb8b"

[colors.cursor]
cursor = "#d8dee9"
text = "#b3b7d4"

[colors.dim]
black = "#373e4d"
blue = "#68809a"
cyan = "#6d96a5"
green = "#809575"
magenta = "#8c738c"
red = "#94545d"
white = "#aeb3bb"
yellow = "#b29e75"

[colors.normal]
black = "#3b4252"
blue = "#81a1c1"
cyan = "#88c0d0"
green = "#a3be8c"
magenta = "#b48ead"
red = "#bf616a"
white = "#e5e9f0"
yellow = "#ebcb8b"

[colors.primary]
background = "#101018"
dim_foreground = "#a5abb6"
foreground = "#d8dee9"

#[colors.search.footer_bar]
#background = "#434c5e"
#foreground = "#d8dee9"

[colors.search.matches]
background = "#88c0d0"
foreground = "CellBackground"

[colors.selection]
background = "#4c566a"
text = "CellForeground"

[colors.vi_mode_cursor]
cursor = "#d8dee9"
text = "#2e3440"

[font]
size = 13.0

[font.normal]
family = "GeistMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "GeistMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "GeistMono Nerd Font Mono"
style = "Italic"

[keyboard]
bindings = [
    { key = "Equals", mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus", mods = "Control", action = "DecreaseFontSize" }
]

[[hints.enabled]]
regex = "[^: ]+:\\d+"
command = { program = "sh", args = [
    "-c", 
    "/opt/homebrew/bin/tmux send-keys \"/opt/homebrew/bin/nvim $0\" Enter"
] }
mouse = { enabled = true, mods = "Command" }
